<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klasifikasi Telur</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <span class="icon">🥚</span>
                <h1>Deteksi Kualitas Telur</h1>
                <p class="subtitle">Upload gambar telur untuk mendeteksi kualitasnya</p>
            </div>

            <div class="upload-area" id="uploadArea">
                <input type="file" id="fileInput" accept="image/*" hidden>
                <div class="upload-content" onclick="document.getElementById('fileInput').click()">
                    <span class="upload-icon">📁</span>
                    <p>Klik untuk upload gambar</p>
                    <p class="upload-hint">PNG, JPG, JPEG didukung</p>
                </div>
            </div>

            <div class="preview-container" id="previewContainer" style="display:none;">
                <img id="preview" alt="Preview gambar">
                <button class="btn-reset" onclick="resetForm()">✕ Ganti Gambar</button>
            </div>

            <button class="btn-predict" id="btnPredict" onclick="predict()" disabled>
                <span id="btnText">Analisis Gambar</span>
                <span id="btnLoader" class="loader" style="display:none;"></span>
            </button>

            <div class="result-box" id="resultBox" style="display:none;">
                <div class="result-icon" id="resultIcon"></div>
                <h2 class="result-label" id="resultLabel"></h2>
                <p class="result-confidence" id="resultConfidence"></p>
            </div>

            <div class="error-box" id="errorBox" style="display:none;">
                <p id="errorMsg"></p>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('uploadArea');
        const previewContainer = document.getElementById('previewContainer');
        const preview = document.getElementById('preview');
        const btnPredict = document.getElementById('btnPredict');
        const resultBox = document.getElementById('resultBox');
        const errorBox = document.getElementById('errorBox');

        fileInput.addEventListener('change', function () {
            const file = this.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = e => {
                preview.src = e.target.result;
                uploadArea.style.display = 'none';
                previewContainer.style.display = 'flex';
                btnPredict.disabled = false;
                resultBox.style.display = 'none';
                errorBox.style.display = 'none';
            };
            reader.readAsDataURL(file);
        });

        // Drag & drop
        uploadArea.addEventListener('dragover', e => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
        uploadArea.addEventListener('drop', e => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            fileInput.files = e.dataTransfer.files;
            fileInput.dispatchEvent(new Event('change'));
        });

        function resetForm() {
            fileInput.value = '';
            uploadArea.style.display = 'flex';
            previewContainer.style.display = 'none';
            btnPredict.disabled = true;
            resultBox.style.display = 'none';
            errorBox.style.display = 'none';
        }

        async function predict() {
            const file = fileInput.files[0];
            if (!file) return;

            const btnText = document.getElementById('btnText');
            const btnLoader = document.getElementById('btnLoader');
            btnText.style.display = 'none';
            btnLoader.style.display = 'inline-block';
            btnPredict.disabled = true;
            resultBox.style.display = 'none';
            errorBox.style.display = 'none';

            const formData = new FormData();
            formData.append('file', file);

            try {
                const res = await fetch('/predict', { method: 'POST', body: formData });
                const data = await res.json();

                if (data.error) {
                    errorBox.style.display = 'block';
                    document.getElementById('errorMsg').textContent = '⚠️ ' + data.error;
                } else {
                    const isCrack = data.result === 'crack';
                    document.getElementById('resultIcon').textContent = isCrack ? '❌' : '✅';
                    document.getElementById('resultLabel').textContent = isCrack ? 'Retak (Crack)' : 'Bagus (Good)';
                    document.getElementById('resultLabel').style.color = isCrack ? '#e74c3c' : '#27ae60';
                    document.getElementById('resultConfidence').textContent = 'Confidence: ' + data.confidence;
                    resultBox.style.display = 'flex';
                    resultBox.className = 'result-box ' + (isCrack ? 'result-crack' : 'result-good');
                }
            } catch (err) {
                errorBox.style.display = 'block';
                document.getElementById('errorMsg').textContent = '⚠️ Gagal menghubungi server.';
            } finally {
                btnText.style.display = 'inline';
                btnLoader.style.display = 'none';
                btnPredict.disabled = false;
            }
        }
    </script>
</body>
</html>
